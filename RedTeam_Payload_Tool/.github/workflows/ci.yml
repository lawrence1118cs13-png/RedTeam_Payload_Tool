name: Red Team Tool CI Pipeline

# 設定觸發時機：當有人 push 或發送 PR 到 main 或 master 分支時自動執行
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 指定自動化測試要在 Linux (Ubuntu) 環境下執行
    runs-on: ubuntu-latest

    steps:
    # 1. 複製 GitHub 倉庫裡的程式碼到雲端伺服器
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 在雲端伺服器上安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 使用穩定的 Python 版本

    # 3. 快取機制（選填，可加速以後的測試速度）
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. 安裝 requirements.txt 裡面的所有套件
    - name: Install dependencies
      run: |
                        python -m pip install --upgrade pip
                        pip install -r requirements.txt

    # 5. 執行自動化測試，並檢查覆蓋率
    - name: Run tests with pytest
      run: |
                        pytest --cov=. --cov-report=term-missing